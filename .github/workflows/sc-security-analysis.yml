name: Smart Contract Security Analysis Pipeline
on:
  #  push:
  #    branches: [main, develop]
  #    paths: ["contracts/**/*.sol"]
  #  pull_request:
  #    branches: [main]
  #    paths: ["contracts/**/*.sol"]
  #  schedule:
  #    - cron: "0 2 * * 1" # Weekly comprehensive scan
  workflow_dispatch:
    inputs:
      analysis_depth:
        description: "Analysis depth level"
        required: true
        default: "standard"
        type: choice
        options: ["quick", "standard", "comprehensive"]

permissions:
  contents: read
  security-events: write
  pull-requests: write
  issues: write

jobs:
  # Context setup and change detection
  analysis-setup:
    runs-on: ubuntu-latest
    outputs:
      contracts-changed: ${{ steps.changes.outputs.contracts }}
      analysis-config: ${{ steps.config.outputs.config }}
      baseline-hash: ${{ steps.baseline.outputs.hash }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect contract changes
        uses: dorny/paths-filter@v2
        id: changes
        with:
          filters: |
            contracts:
              - 'contracts/**/*.sol'
              - 'test/**/*.sol'
              - 'foundry.toml'
              - 'hardhat.config.js'

      - name: Generate analysis baseline
        id: baseline
        run: |
          # Create deterministic hash from contract sources
          find contracts -name "*.sol" -exec sha256sum {} \; | \
            sort | sha256sum | cut -d' ' -f1 > baseline.hash
          echo "hash=$(cat baseline.hash)" >> $GITHUB_OUTPUT

      - name: Load analysis configuration
        id: config
        run: |
          config='{"severity_threshold": "medium", "enable_llm": true, "cost_optimization": true}'
          echo "config=$config" >> $GITHUB_OUTPUT

  # Multi-tool static analysis
  static-analysis:
    needs: analysis-setup
    #if: needs.analysis-setup.outputs.contracts-changed == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tool: [slither, mythril, semgrep]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js and Python
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          npm ci
          pip install -r .github/requirements.txt

      - name: Restore analysis cache
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/slither
            ~/.cache/mythril
            node_modules/.cache
          key: analysis-${{ matrix.tool }}-${{ needs.analysis-setup.outputs.baseline-hash }}
          restore-keys: analysis-${{ matrix.tool }}-

      - name: Run static analysis
        id: analysis
        run: |
          python .github/scripts/run_analysis.py \
            --tool ${{ matrix.tool }} \
            --config '${{ needs.analysis-setup.outputs.analysis-config }}' \
            --output results-${{ matrix.tool }}.json \
            --sarif results-${{ matrix.tool }}.sarif

      - name: Upload raw results
        uses: actions/upload-artifact@v4
        with:
          name: static-analysis-${{ matrix.tool }}
          path: |
            results-${{ matrix.tool }}.json
            results-${{ matrix.tool }}.sarif
          retention-days: 30
