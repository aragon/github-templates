name: Security Analysis Smart Contract
on:
  workflow_call:
    inputs:
      # Tools to use
      ## Slither
      ### https://github.com/crytic/slither/wiki/Usage#configuration-file
      slither:
        required: true
        type: boolean
        default: true
        description: "Enable slither"
      slither-config:
        required: false
        type: string
        default: "./security-configs/slither.conf"

      # Execution inputs
      ## Workflow runner
      workflow-runner:
        required: false
        type: string
        default: "ubuntu-latest"
        description: "Workflow runner"
      template-ref:
        required: false
        type: string
        default: "feat/sc-analysis"
        description: "template branch ref"

      # Results inputs
      ## Results
      result-path:
        required: false
        type: string
        default: "results"
        description: "results path"
      ## Artifact configuration
      artifact-name:
        required: false
        type: string
        default: "results-artifacts"
        description: "Name for results artifacts"
      artifact-retention-days:
        required: false
        type: number
        default: 7
        description: "Artifact retention period in days"

      # General options
      environment:
        required: false
        type: string
        default: "test"
        description: "environment to use"

#    outputs:
#      artifact-id:
#        description: "ID of uploaded build artifact"
#        value: ${{ jobs.build.outputs.artifact-id }}

# Concurrency control
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.environment }}
  cancel-in-progress: true

jobs:
  # add build step?

  slither:
    if: ${{ inputs.slither }}

    #runs-on: ${{ inputs.workflow-runner }}
    runs-on: [self-hosted, claude]
    outputs:
      artifact-id: ${{ steps.upload.outputs.artifact-id }}
    steps:
      # Checkout everything
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: repo
          submodules: "recursive"

      - name: Checkout analyzer configs
        uses: actions/checkout@v4
        with:
          path: templates
          repository: aragon/github-templates
          ref: ${{ inputs.template-ref }}

      - name: List files
        if: always()
        run: pwd;ls -la *

      # Build the code
      ## Foundry
      #- name: foundry-toolchain
      #  uses: foundry-rs/foundry-toolchain@v1.4.0
      #
      #- name: Show Forge version
      #  run: forge --version
      #
      #- name: Run Forge build
      #  run: |
      #    forge build --sizes
      #
      # Run Slither
      - name: Run Slither
        run: |
          docker run \
          -v ${{ github.workspace }}/repo:/repo \
          trailofbits/eth-security-toolbox:latest \
          bash -c "cd /repo && \
          ls -la && \
          slither . \
          --sarif results.sarif \
          --checklist \
          --json results.json \
          --fail-none \
          --markdown-root ${{ github.server_url }}/${{ github.repository }}/blob/${{ github.sha }} \
          > slither-report.md"

      - name: List files
        if: always()
        run: pwd;ls -la *
      - name: Run Claude Code Review
        id: claude-review
        run: |
          cd repo
          claude --print "Read the sarif file and generate a very short summary"

      #- name: List files
      #  if: always()
      #  run: pwd;ls -la *
      - name: Upload build artifacts
        id: upload
        uses: actions/upload-artifact@v4

        with:
          name: ${{ inputs.artifact-name }}-${{ github.job }}-${{ github.run_id }}
          path: |
            repo/results.sarif
            repo/results.json
            repo/slither-report.md
            repo/results_llm.md
          retention-days: ${{ inputs.artifact-retention-days }}
          compression-level: 6
          if-no-files-found: warn
        continue-on-error: false
