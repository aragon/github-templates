name: Security Analysis Smart Contract
on:
  workflow_call:
    inputs:
      # Tools to use
      ## Slither
      ### https://github.com/crytic/slither/wiki/Usage#configuration-file
      slither:
        required: false
        type: boolean
        default: false
        description: "Enable slither"
      slither-config:
        required: false
        type: string
        default: "./security-configs/slither.conf"
      paths-to-analyze:
        required: false
        type: string
        default: ""
        description: "include paths to analyze"

      # Execution inputs
      ## Workflow runner
      workflow-runner:
        required: false
        type: string
        default: "ubuntu-latest"
        description: "Workflow runner"
      template-ref:
        required: false
        type: string
        default: "feat/sc-analysis"
        description: "template branch ref"
      download-repos:
        required: false
        type: boolean
        default: false
        description: "download repos"

      # Results inputs
      ## Results
      upload-artifacts:
        required: false
        type: boolean
        default: false
        description: "Select artifacts to upload"
      result-path:
        required: false
        type: string
        default: "results"
        description: "results path"
      ## Artifact configuration
      artifact-name:
        required: false
        type: string
        default: "results-artifacts"
        description: "Name for results artifacts"
      artifact-retention-days:
        required: false
        type: number
        default: 7
        description: "Artifact retention period in days"

      #Claude
      ## Template
      claude-template:
        required: false
        type: string
        default: "../templates/.github/workflows/sc-analyzer/default_configs/claude/claude.md"
        description: "claude template"
      claude:
        required: false
        type: boolean
        default: false
        description: "Claude execution"

      # General options
      environment:
        required: false
        type: string
        default: "test"
        description: "environment to use"
      final-cleanup:
        required: false
        type: boolean
        default: true
        description: "final cleanup"

#    outputs:
#      artifact-id:
#        description: "ID of uploaded build artifact"
#        value: ${{ jobs.build.outputs.artifact-id }}

# Concurrency control
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.environment }}
  cancel-in-progress: true

jobs:
  download-repos:
    if: ${{ inputs.download-repos }}
    runs-on: [self-hosted, claude]
    steps:
      # Checkout everything
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: repo-${{ github.run_id }}
          submodules: "recursive"
      - name: Create results directory
        run: mkdir -p repo-${{ github.run_id }}/${{ inputs.result-path }}
      - name: Checkout analyzer configs
        uses: actions/checkout@v4
        with:
          path: templates-${{ github.run_id }}
          repository: aragon/github-templates
          ref: ${{ inputs.template-ref }}

  slither:
    if: ${{ inputs.slither }}
    needs: [download-repos]
    #runs-on: ${{ inputs.workflow-runner }}
    runs-on: [self-hosted, claude]
    outputs:
      artifact-id: ${{ steps.upload.outputs.artifact-id }}
    env:
      DOCKER_ENV_SLITHER: ".env.slither"
    steps:
      - name: List files
        run: pwd;ls -la *
      - name: Prepare config
        run: |
          FILE_NAME=${{ env.DOCKER_ENV_SLITHER }}-${{ github.run_id }}

          ## Include files

          if [[ ${{inputs.paths-to-analyze}} == "" ]];then
            echo "SLITHER_INCLUDE_PATHS= " >> $FILE_NAME
          else
            echo "SLITHER_INCLUDE_PATHS=--include-paths ${{inputs.paths-to-analyze}}" >> $FILE_NAME
          fi
          cat $FILE_NAME

      # Build the code
      ## Foundry
      #- name: foundry-toolchain
      #  uses: foundry-rs/foundry-toolchain@v1.4.0
      #
      #- name: Show Forge version
      #  run: forge --version
      #
      #- name: Run Forge build
      #  run: |
      #    forge build --sizes
      #
      # Run Slither
      ## https://github.com/crytic/slither/wiki/Printer-documentation#inheritance-graph
      - name: Run Slither
        run: |
          pwd && \
          ls -la && \
          docker run --rm \
          -v runner_data_0:/mount_vol \
          --env-file ${{ env.DOCKER_ENV_SLITHER }}-${{ github.run_id }} \
          trailofbits/eth-security-toolbox:latest \
          bash -c "cd /mount_vol/$(echo ${{ github.workspace }} |cut -d'/' -f4- )/repo-${{ github.run_id }} && \
          ls -la && \
          slither . \
          --sarif ${{ inputs.result-path }}/results.sarif \
          --checklist \
          --json ${{ inputs.result-path }}/results.json \
          --fail-none \
          \$SLITHER_INCLUDE_PATHS \
          --markdown-root ${{ github.server_url }}/${{ github.repository }}/blob/${{ github.sha }} \
          > ${{ inputs.result-path }}/slither-report.md"

      - name: List files
        if: always()
        run: pwd;ls -la *

  claude:
    if: always() && ${{ inputs.claude }}
    needs: [slither]
    #runs-on: ${{ inputs.workflow-runner }}
    runs-on: [self-hosted, claude]

    steps:
      - name: List files
        if: always()
        run: pwd;ls -la *
      - name: Run Claude Code Review
        env:
          paths-to-analyze: ${{ inputs.paths-to-analyze }}
        id: claude-review
        run: |
          cd repo-${{ github.run_id }}
          envsubst < ${{ inputs.claude-template }} | claude --dangerously-skip-permissions --print

  upload-artifacts:
    if: ${{ inputs.upload-artifacts }}
    needs: [slither, claude]
    runs-on: [self-hosted, claude]
    steps:
      - name: List files
        if: always()
        run: pwd;ls -la *
      - name: Upload build artifacts
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}-${{ github.job }}-${{ github.run_id }}
          path: |
            repo-${{ github.run_id }}/${{ inputs.result-path }}/*
            repo-${{ github.run_id }}/exploits/*
          retention-days: ${{ inputs.artifact-retention-days }}
          compression-level: 6
          if-no-files-found: warn
  cleanup:
    needs: [upload-artifacts]
    if: |
      always() &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled') &&
      ${{ inputs.final-cleanup }}
    runs-on: [self-hosted, claude]
    steps:
      - name: Cleanup temporary resources
        run: |
          echo "Performing cleanup operations..."
          pwd
          docker run --rm \
          -v runner_data_0:/mount_vol \
          ubuntu \
          bash -c "rm -rf /mount_vol/$(echo ${{ github.workspace }} |cut -d'/' -f4- )"
          rm -rf ${{ github.workspace }}/*-${{ github.run_id }}

        continue-on-error: true
