name: Security Analysis Smart Contract
on:
  workflow_call:
    inputs:
      # Tools to use
      ## Slither
      ### https://github.com/crytic/slither/wiki/Usage#configuration-file
      slither:
        required: false
        type: boolean
        default: true
        description: "Enable slither"
      slither-config:
        required: false
        type: string
        default: "./slither.config.json"

      # Execution inputs
      ## Workflow runner
      workflow-runner:
        required: true
        type: string
        default: "ubuntu-latest"
        description: "Workflow runner"

      ## Build configuration
      node-version:
        required: false
        type: string
        default: "18"
        description: "Node.js version to use"

      # Results inputs
      ## Results
      result-path:
        required: false
        type: string
        default: "results"
        description: "results path"
      ## Artifact configuration
      artifact-name:
        required: false
        type: string
        default: "results-artifacts"
        description: "Name for results artifacts"
      artifact-retention-days:
        required: false
        type: number
        default: 7
        description: "Artifact retention period in days"

      # General options
      environment:
        required: false
        type: string
        default: "test"
        description: "environment to use"

#    outputs:
#      artifact-id:
#        description: "ID of uploaded build artifact"
#        value: ${{ jobs.build.outputs.artifact-id }}

# Concurrency control
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.environment }}
  cancel-in-progress: true

jobs:
  # add build step?
  slither:
    if: ${{ inputs.enable-slither }}

    runs-on: ${{ inputs.workflow-runner }}
    outputs:
      version: ${{ steps.version.outputs.result }}
      artifact-id: ${{ steps.upload.outputs.artifact-id }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: "recursive"

      - name: Run Slither
        uses: crytic/slither-action@v0.4.1
        with:
          sarif: ${{ inputs.result-path }}/results.sarif
          fail-on: none

      - name: Upload build artifacts
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}-${{ github.job }}-${{ github.run_id }}
          path: |
            ${{ inputs.result-path }}
          retention-days: ${{ inputs.artifact-retention-days }}
          compression-level: 6
          if-no-files-found: warn
        continue-on-error: false
