name: Security Analysis Smart Contract
on:
  workflow_call:
    inputs:
      # Tools to use
      ## Slither
      ### https://github.com/crytic/slither/wiki/Usage#configuration-file
      slither:
        required: true
        type: boolean
        default: true
        description: "Enable slither"
      slither-config:
        required: false
        type: string
        default: "./security-configs/slither.conf"

      # Execution inputs
      ## Workflow runner
      workflow-runner:
        required: false
        type: string
        default: "ubuntu-latest"
        description: "Workflow runner"
      template-ref:
        required: false
        type: string
        default: "feat/sc-analysis"
        description: "template branch ref"
      download-repos:
        required: false
        type: boolean
        default: true
        description: "download repos"

      # Results inputs
      ## Results
      upload-artifacts:
        required: false
        type: boolean
        default: true
        description: "Select artifacts to upload"
      result-path:
        required: false
        type: string
        default: "results"
        description: "results path"
      ## Artifact configuration
      artifact-name:
        required: false
        type: string
        default: "results-artifacts"
        description: "Name for results artifacts"
      artifact-retention-days:
        required: false
        type: number
        default: 7
        description: "Artifact retention period in days"

      #Claude
      ## Template
      claude-template:
        required: false
        type: string
        default: "../templates/.github/workflows/sc-analyzer/default_configs/claude/claude.md"
        description: "claude template"
      claude:
        required: false
        type: boolean
        default: true
        description: "Claude execution"

      # General options
      environment:
        required: false
        type: string
        default: "test"
        description: "environment to use"
      final-cleanup:
        required: false
        type: boolean
        default: true
        description: "final cleanup"

#    outputs:
#      artifact-id:
#        description: "ID of uploaded build artifact"
#        value: ${{ jobs.build.outputs.artifact-id }}

# Concurrency control
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.environment }}
  cancel-in-progress: true

jobs:
  download-repos:
    if: ${{ inputs.download-repos }}
    runs-on: [self-hosted, claude]
    steps:
      # Checkout everything
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: repo-${{ github.run_id }}
          submodules: "recursive"
      - name: Create results directory
        run: mkdir -p repo-${{ github.run_id }}/${{ inputs.result-path }}-${{ github.run_id }}
      - name: Checkout analyzer configs
        uses: actions/checkout@v4
        with:
          path: templates-${{ github.run_id }}
          repository: aragon/github-templates
          ref: ${{ inputs.template-ref }}

  slither:
    if: ${{ inputs.slither }}
    needs: [download-repos]
    #runs-on: ${{ inputs.workflow-runner }}
    runs-on: [self-hosted, claude]
    outputs:
      artifact-id: ${{ steps.upload.outputs.artifact-id }}
    steps:
      - name: List files
        if: always()
        run: pwd;ls -la *

      # Build the code
      ## Foundry
      #- name: foundry-toolchain
      #  uses: foundry-rs/foundry-toolchain@v1.4.0
      #
      #- name: Show Forge version
      #  run: forge --version
      #
      #- name: Run Forge build
      #  run: |
      #    forge build --sizes
      #
      # Run Slither
      - name: Run Slither
        run: |
          pwd && \
          ls -la && \
          docker run -u 1000:1000 --rm \
          -v runner_data_0:/mount_vol \
          trailofbits/eth-security-toolbox:latest \
          bash -c "cd /mount_vol/$(echo ${{ github.workspace }} |cut -d'/' -f4- )/repo-${{ github.run_id }} && \
          ls -la && \
          slither . \
          --sarif ${{ inputs.result-path }}-${{ github.run_id }}/results.sarif \
          --checklist \
          --json ${{ inputs.result-path }}-${{ github.run_id }}/results.json \
          --fail-none \
          --markdown-root ${{ github.server_url }}/${{ github.repository }}/blob/${{ github.sha }} \
          > ${{ inputs.result-path }}-${{ github.run_id }}/slither-report.md"

      - name: List files
        if: always()
        run: pwd;ls -la *

  claude:
    if: ${{ inputs.claude }}
    needs: [slither]
    #runs-on: ${{ inputs.workflow-runner }}
    runs-on: [self-hosted, claude]
    steps:
      - name: List files
        if: always()
        run: pwd;ls -la *
      - name: Run Claude Code Review
        id: claude-review
        run: |
          cd repo-${{ github.run_id }}
          cat ${{ inputs.claude-template }} | claude --print > ${{ inputs.result-path }}-${{ github.run_id }}/results_llm.md

  upload-artifacts:
    if: ${{ inputs.claude }}
    needs: [slither, claude]
    runs-on: [self-hosted, claude]
    steps:
      - name: List files
        if: always()
        run: pwd;ls -la *
      - name: Upload build artifacts
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}-${{ github.job }}-${{ github.run_id }}
          path: |
            repo-${{ github.run_id }}/${{ inputs.result-path }}-${{ github.run_id }}/*

          retention-days: ${{ inputs.artifact-retention-days }}
          compression-level: 6
          if-no-files-found: warn
        continue-on-error: false
  cleanup:
    needs: [upload-artifacts]
    if: always() && ${{ inputs.final-cleanup }}
    runs-on: [self-hosted, claude]
    steps:
      - name: Cleanup temporary resources
        run: |
          echo "Performing cleanup operations..."
          pwd
          rm -rf ${{ github.workspace }}/*-${{ github.run_id }}

        continue-on-error: true
