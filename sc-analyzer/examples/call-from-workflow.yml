name: Security analysis
on:
  workflow_dispatch:
    inputs:
      # Tools to use
      ## Slither
      slither:
        description: "Enable Slither analysis"
        type: boolean
        default: true
      slither-config:
        required: false
        type: string
        default: "./security-configs/slither.conf"

jobs:
  build-and-test:
    uses: aragon/github-templates/sc-analyzer/workflows/security-analysis.yml@v0.0.1
    with:
      slither: ${{ inputs.slither}}
      slither-config: ${{ inputs.slither-config}}
